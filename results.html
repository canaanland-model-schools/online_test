<!DOCTYPE html>
<html>
<head>
    <title>Exam Results</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .score { font-size: 48px; font-weight: bold; color: green; }
    </style>
</head>
<body>
    <h1>Your Exam Result</h1>
    <div class="score">
        <span id="score">0</span> / <span id="total">0</span>
    </div>
    <p>Student: <span id="studentName"></span></p>
    <button onclick="window.location.href='login.html'">Back to Login</button>

    <script>
        const score = localStorage.getItem("examScore") || 0;
        const total = localStorage.getItem("totalQuestions") || 5;
        const student = localStorage.getItem("examUser") || sessionStorage.getItem("username") || "Student";

        document.getElementById("score").innerText = score;
        document.getElementById("total").innerText = total;
        document.getElementById("studentName").innerText = student;
    </script>
</body>
</html>
