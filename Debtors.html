<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debtor - Canaanland Model Schools</title>
    <!-- Google Fonts, FontAwesome, your existing styles (keep them) -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, aqua, #0077be); /* aqua to deep blue gradient */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: url('img/wisdom_logo1.png') no-repeat center center;
            background-size: 300px 300px;
            opacity: 0.9;
            z-index: 0;
            /* REMOVED pointer-events: none; to make button clickable */
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            text-align: center;
            border: 2px solid #1e90ff; /* blue accent border */
        }

        /* School logo section */
        .logo-area {
            background: #1e90ff; /* dodger blue */
            padding: 20px 0;
            border-bottom: 4px solid fuchsia;
        }

        .logo-area img {
            max-width: 150px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
        }

        /* User image area */
        .user-area {
            background-color: aqua;
            padding: 30px 0 20px;
            position: relative;
        }

        .user-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: fuchsia;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: 0 8px 0 #1e90ff;
            overflow: hidden; /* ensures image stays inside circle */
        }

        .user-avatar i {
            font-size: 60px;
            color: white;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Student info (name) */
        .student-info {
            margin-top: 10px;
        }
        .student-info h2 {
            font-size: 1.5rem;
            color: #1e3c72;
        }

        /* Message card */
        .message-card {
            background: linear-gradient(145deg, #ffffff, #f0f8ff);
            margin: 25px 20px;
            padding: 25px;
            border-radius: 15px;
            border-left: 8px solid fuchsia;
            border-right: 8px solid #1e90ff;
            box-shadow: 0 8px 0 #b0e0e6;
        }

        .message-card h2 {
            color: #1e3c72;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .message-card p {
            color: #333;
            font-size: 1.2rem;
            font-weight: 500;
            background: aqua;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 40px;
            box-shadow: 0 4px 0 #1e90ff;
            margin-top: 10px;
        }

        /* OK button */
        .btn-ok {
            background: fuchsia;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 15px 40px;
            border-radius: 50px;
            margin: 20px auto 30px;
            display: inline-block;
            cursor: pointer;
            box-shadow: 0 8px 0 #b222b0, 0 6px 20px rgba(255, 0, 255, 0.4);
            transition: 0.2s;
            border: 2px solid aqua;
        }

        .btn-ok:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 0 #b222b0, 0 8px 25px rgba(255, 0, 255, 0.6);
        }

        .btn-ok:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b222b0;
        }

        /* Footer text */
        .footer {
            background: #1e90ff;
            color: white;
            padding: 10px;
            font-size: 0.9rem;
            border-top: 3px solid fuchsia;
        }

        /* Responsive adjustments */
        @media (max-width: 400px) {
            .message-card h2 {
                font-size: 1.5rem;
            }
            .message-card p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <img src="img/Ctemplogo.png" alt="Canaanland Model Schools Logo" onerror="...">
        </div>

        <!-- User image area -->
        <div class="user-area">
            <div class="user-avatar">
                <!-- This img tag will be updated by JavaScript -->
                <img id="userImage" src="img/default_user.jpg" alt="Student Image">
            </div>
            <div class="student-info">
                <h2 id="username">Student Name</h2>
            </div>
        </div>

        <div class="message-card">
            <h2>⚠️ Debtor Notice</h2>
            <p>You have not balanced your school fees</p>
        </div>

        <button class="btn-ok" onclick="redirectToIndex()">OK</button>

        <div class="footer">
            Canaanland Model Schools – God is Our Strength
        </div>
    </div>

    <script>
        // Load user data from sessionStorage
        const userImage = sessionStorage.getItem('image');
        const userName = sessionStorage.getItem('username');

        if (userImage) {
            document.getElementById('userImage').src = userImage;
        }
        if (userName) {
            document.getElementById('username').textContent = userName;
        }

        function redirectToIndex() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
